<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial;
        }

        body {
            background: #0f1724;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .dashboard {
            background: #1e293b;
            padding: 30px;
            border-radius: 12px;
            width: 350px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .avatar img{
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin: 0 auto 15px;
        }

        h1 {
            font-size: 22px;
            margin-bottom: 5px;
            display: flex;
            justify-content: center;
        }
       

        p {
            color: #94a3b8;
            margin-bottom: 20px;
            display: flex;
        }

        button {
            display: block;
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }

       

        

      
    </style>
</head>

<body>

    <div class="dashboard">

        <div class="avatar">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTPQHstFutlfl8tgZAtY8nDWucSWEvFM5AETQ&s" id="dp" >
        </div>

        <h1 id="heading">Welcome User</h1>


        

          <h1 id="username"></h1>
    <p id="email"></p>

    <div class="info">
      <p id="id"></p>
      <p id="phone"></p>
      <p id="address"></p>
      <p>Status: Active User</p>
    </div>
    <button class="btn-profile">View Profile</button>
        <button class="btn-logout">Logout</button> 
    </div>
    <script src="db.js"></script>
</body>

</html>
